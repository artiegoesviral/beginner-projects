<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Lámparas</title>

    <link rel="stylesheet" href="./css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="./js/data.js"></script>
</head>

<body>

    <header>
        <h1><i class="fa-regular fa-gem" style="color: #4180d3;"></i> Gestión de Productos</h1>
    </header>

    <section>
        <article>
            <form id="filtroForm" action="">
                <h2>Filtros de Búsqueda</h2>
                <hr>
                <div class="titulos">
                    <label id="productoTitulo" for="title">Nombre del producto</label>
                    <label id="precio" for="precio">Rango de Precio</label>
                </div>

                <div class="input">
                    <input id="title" name="title" type="text" placeholder="Buscar por nombre de producto...">
                    <input id="precioMin" name="precioMin" type="number" placeholder="200">
                    <p class="rangoPrecio">-</p>
                    <label for="precioMax"></label>
                    <input id="precioMax" name="precioMax" type="number" placeholder="700">
                </div>
                <hr>
                <input id="submit" name="submit" type="submit" value="Filtrar">
            </form>
        </article>
    </section>

    <section id="destacados">
        <h2>Productos Destacados</h2>
        <article>
            <div>
                <!-- <p class="category"></p>
                <p class="name"></p>
                <small></small>
                <p class="price"></p> -->
            </div>

        </article>
    </section>

    <section id="todosProductos">
        <h2>Todos los Productos</h2>
        <article>
            <div>
                <!-- <p class="category"></p>
                <p class="name"></p>
                <small></small>
                <p class="price"></p> -->
            </div>
        </article>
    </section>

    <script src="./js/productos.js"></script>
    <script src="./js/form.js"></script>
</body>

</html>
